<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Jadwal Piket — Realtime Supabase Multi-Tenant">
<title>Jadwal Piket · Kamar Naga Putih</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --brand:      #e8c84a;
  --brand2:     #c9a82a;
  --brand-dim:  rgba(232,200,74,0.12);
  --brand-glow: rgba(232,200,74,0.22);
  --surface:    rgba(14,16,22,0.92);
  --surface2:   rgba(20,22,30,0.88);
  --surface3:   rgba(28,30,42,0.90);
  --glass:      rgba(10,12,18,0.72);
  --border:     rgba(255,255,255,0.07);
  --border2:    rgba(255,255,255,0.11);
  --border3:    rgba(255,255,255,0.18);
  --ink:        #f0f2f8;
  --ink2:       #ffffff;
  --ink3:       #e2e8f0;
  --ink4:       #cbd5e1;
  --ok:         #22c55e;
  --ok-dim:     rgba(34,197,94,0.10);
  --ok-b:       rgba(34,197,94,0.28);
  --danger:     #ef4444;
  --danger-dim: rgba(239,68,68,0.10);
  --danger-b:   rgba(239,68,68,0.28);
  --font:       'Outfit', sans-serif;
  --mono:       'JetBrains Mono', monospace;
  --r:    10px;
  --r-lg: 16px;
  --r-xl: 22px;
  --blur: blur(20px) saturate(1.5);
}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{-webkit-tap-highlight-color:transparent;scroll-behavior:smooth}
body{font-family:var(--font);color:var(--ink);min-height:100vh;overflow-x:hidden;font-size:15px;line-height:1.6;position:relative;}

.bg-layer{position:fixed;inset:0;z-index:0;background-image:url('https://i.imgur.com/bfrp75y.png');background-size:cover;background-position:center;background-repeat:no-repeat;filter:brightness(1.05) contrast(1.05);}
.bg-overlay{position:fixed;inset:0;z-index:1;background:linear-gradient(160deg,rgba(5,7,14,.75) 0%,rgba(8,10,18,.68) 50%,rgba(5,7,14,.80) 100%);}
.bg-glow{position:fixed;top:-250px;left:50%;transform:translateX(-50%);width:700px;height:500px;border-radius:50%;background:radial-gradient(ellipse,rgba(232,200,74,.06) 0%,transparent 65%);pointer-events:none;z-index:2;}

.page{position:relative;z-index:3;max-width:600px;margin:0 auto;padding:0 0 6rem;}

/* HEADER */
.header{background:var(--glass);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border-bottom:1px solid var(--border2);padding:1rem 1.4rem .9rem;position:sticky;top:0;z-index:200;box-shadow:0 1px 0 var(--border),0 4px 24px rgba(0,0,0,.3);}
.header-top{display:flex;align-items:center;justify-content:space-between;gap:1rem;margin-bottom:.8rem;}
.brand{display:flex;align-items:center;gap:12px;}
.brand-logo{width:48px;height:48px;border-radius:14px;overflow:hidden;flex-shrink:0;border:1.5px solid rgba(232,200,74,.3);box-shadow:0 0 20px var(--brand-glow),0 0 40px rgba(232,200,74,.08);background:rgba(0,0,0,.4);}
.brand-logo img{width:100%;height:100%;object-fit:cover;display:block;}
.brand-info{display:flex;flex-direction:column;gap:5px;}
.room-tag{font-family:var(--mono);font-size:.72rem;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:#0a0b0f;background:linear-gradient(135deg,var(--brand),var(--brand2));border:1px solid var(--brand);padding:3px 10px;border-radius:5px;display:inline-block;width:fit-content;box-shadow:0 0 12px var(--brand-glow);}
.brand-title{font-size:1.15rem;font-weight:800;color:var(--ink);letter-spacing:-.3px;line-height:1.2;}
.header-clock{text-align:right;flex-shrink:0;}
.live-date{font-size:.65rem;font-weight:500;color:var(--ink3);white-space:nowrap;display:block;}
.live-time{font-family:var(--mono);font-size:1rem;font-weight:600;color:var(--ink);display:block;text-align:right;letter-spacing:1px;}

.today-strip{display:flex;align-items:center;gap:8px;padding:.55rem .85rem;border-radius:var(--r);font-size:.78rem;font-weight:600;border:1px solid;}
.today-strip.on-duty{background:var(--ok-dim);border-color:var(--ok-b);color:var(--ok);}
.today-strip.holiday{background:var(--danger-dim);border-color:var(--danger-b);color:var(--danger);}
.today-strip.loading{background:var(--surface2);border-color:var(--border2);color:var(--ink3);}
.strip-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;animation:pulse 2s ease-in-out infinite;}
.on-duty .strip-dot{background:var(--ok);}
.holiday .strip-dot{background:var(--danger);animation:none;}
.loading .strip-dot{background:var(--ink3);animation:none;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.5)}}

/* DENDA */
.denda-wrap{padding:1rem 1.4rem 0;}
.denda-banner{background:linear-gradient(135deg,rgba(30,20,0,.92),rgba(45,30,0,.92));border:1px solid rgba(232,200,74,.3);border-radius:var(--r-lg);padding:.9rem 1.1rem;display:flex;align-items:center;gap:12px;box-shadow:0 4px 24px rgba(232,200,74,.10);backdrop-filter:blur(10px);animation:fadeUp .5s ease;}
.denda-left{display:flex;align-items:center;gap:10px;flex:1;}
.denda-icon-wrap{width:38px;height:38px;border-radius:10px;background:var(--brand-dim);border:1px solid rgba(232,200,74,.25);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;}
.denda-icon-wrap img{width:100%;height:100%;object-fit:contain;}
.denda-tag{font-family:var(--mono);font-size:.52rem;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:rgba(232,200,74,.55);margin-bottom:2px;}
.denda-msg{font-size:.88rem;font-weight:800;color:var(--brand);line-height:1.3;text-shadow:0 0 20px var(--brand-glow);}
.denda-pill{font-family:var(--mono);font-size:.88rem;font-weight:700;color:#0a0b0f;background:linear-gradient(135deg,var(--brand),var(--brand2));padding:6px 14px;border-radius:8px;flex-shrink:0;white-space:nowrap;box-shadow:0 2px 12px var(--brand-glow);}

/* SLIDER */
.slider-section{padding:0 1.4rem;margin-top:1rem;}
.slider-wrap{position:relative;overflow:hidden;width:100%;aspect-ratio:16/9;border-radius:var(--r-lg);background:#000;border:1px solid var(--border2);}
.slider-track{display:flex;width:100%;height:100%;transition:transform .45s cubic-bezier(.4,0,.2,1);}
.slide{min-width:100%;height:100%;overflow:hidden;}
.slide img{width:100%;height:100%;object-fit:cover;display:block;user-select:none;-webkit-user-drag:none;}
.slider-btn{position:absolute;top:50%;transform:translateY(-50%);z-index:10;width:34px;height:34px;border-radius:50%;border:1px solid rgba(255,255,255,.2);background:rgba(0,0,0,.5);backdrop-filter:blur(8px);color:white;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.slider-btn:hover{background:rgba(0,0,0,.8);border-color:rgba(255,255,255,.5);}
.slider-btn.prev{left:10px;}.slider-btn.next{right:10px;}
.slider-dots{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);display:flex;gap:5px;z-index:10;}
.dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.35);cursor:pointer;transition:all .25s;border:none;padding:0;}
.dot.active{background:white;width:18px;border-radius:3px;}
.slide-counter{position:absolute;top:8px;right:10px;z-index:10;font-family:var(--mono);font-size:.62rem;background:rgba(0,0,0,.6);color:rgba(255,255,255,.85);padding:2px 8px;border-radius:99px;backdrop-filter:blur(6px);}
.slider-bar{height:2px;background:rgba(255,255,255,.06);overflow:hidden;margin-top:2px;}
.slider-bar-fill{height:100%;background:var(--brand);width:0%;transition:width .05s linear;}

/* WEEK NAV */
.week-nav{display:flex;align-items:center;justify-content:space-between;padding:.75rem 1.4rem;background:var(--glass);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border-bottom:1px solid var(--border);margin-top:.75rem;}
.week-label{font-size:.72rem;font-weight:600;color:var(--ink2);font-family:var(--mono);}
.week-ctrl{display:flex;align-items:center;gap:6px;}
.btn-week{width:28px;height:28px;border:1px solid var(--border3);border-radius:8px;background:var(--surface2);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink3);font-size:.85rem;transition:all .15s;}
.btn-week:hover{background:var(--surface3);color:var(--ink);border-color:var(--brand);}
.btn-today{padding:0 11px;height:28px;border:1px solid rgba(232,200,74,.3);border-radius:8px;background:var(--brand-dim);color:var(--brand);font-family:var(--font);font-size:.68rem;font-weight:700;cursor:pointer;transition:all .15s;}
.btn-today:hover{background:var(--brand);color:#0a0b0f;border-color:var(--brand);}

/* CARDS */
.schedule{padding:1rem 1.4rem;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.day-card{background:var(--surface);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--border2);border-radius:var(--r-lg);margin-bottom:.65rem;overflow:hidden;transition:all .2s;animation:fadeUp .35s ease both;position:relative;}
.day-card:hover{border-color:var(--border3);box-shadow:0 4px 20px rgba(0,0,0,.4);}
.day-card.is-today{border-color:rgba(34,197,94,.4);box-shadow:0 0 0 1px rgba(34,197,94,.15),0 4px 20px rgba(0,0,0,.4);}
.day-card.is-sunday{border-color:rgba(239,68,68,.28);}
.day-card.done-card{background:rgba(10,25,15,.90);}
.day-card::before{content:'';position:absolute;left:0;top:8px;bottom:8px;width:3px;border-radius:0 2px 2px 0;}
.day-card.upcoming::before{background:var(--border3);}
.day-card.live::before{background:var(--ok);box-shadow:0 0 8px var(--ok);}
.day-card.done-card::before{background:rgba(34,197,94,.45);}
.day-card.is-sunday::before{background:var(--danger);opacity:.4;}
.day-card:nth-child(1){animation-delay:.03s}.day-card:nth-child(2){animation-delay:.07s}.day-card:nth-child(3){animation-delay:.11s}.day-card:nth-child(4){animation-delay:.15s}.day-card:nth-child(5){animation-delay:.19s}.day-card:nth-child(6){animation-delay:.23s}.day-card:nth-child(7){animation-delay:.27s}

.day-row{display:flex;align-items:stretch;}
.date-col{padding:.85rem .8rem;min-width:76px;flex-shrink:0;border-right:1px solid var(--border);display:flex;flex-direction:column;justify-content:center;background:rgba(0,0,0,.2);}
.is-today  .date-col{background:rgba(34,197,94,.07);border-right-color:rgba(34,197,94,.2);}
.is-sunday .date-col{background:rgba(239,68,68,.06);border-right-color:rgba(239,68,68,.18);}
.date-dow{font-family:var(--mono);font-size:.55rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.7);margin-bottom:1px;}
.is-today  .date-dow{color:var(--ok);}
.is-sunday .date-dow{color:var(--danger);}
.date-num{font-size:1.5rem;font-weight:800;line-height:1;letter-spacing:-1.5px;color:#fff;}
.is-today  .date-num{color:var(--ok);}
.is-sunday .date-num{color:var(--danger);}
.date-mon{font-size:.6rem;color:rgba(255,255,255,.7);margin-top:2px;font-weight:500;}
.card-body{flex:1;padding:.75rem 1rem;display:flex;flex-direction:column;justify-content:center;gap:8px;}

.persons-row{display:flex;align-items:center;justify-content:space-between;gap:.75rem;}
.persons-list{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.person-chip{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.04);border:1px solid var(--border2);border-radius:99px;padding:4px 12px 4px 4px;transition:border-color .15s;}
.person-chip:hover{border-color:rgba(232,200,74,.25);}
.avatar-sm{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.58rem;font-weight:800;flex-shrink:0;overflow:hidden;border:1.5px solid rgba(232,200,74,.3);background:rgba(0,0,0,.4);}
.avatar-sm img{width:100%;height:100%;object-fit:cover;display:block;border-radius:50%;}
.avatar-sm.done-av{border-color:var(--ok-b);}
.person-nm{font-size:.8rem;font-weight:700;color:var(--ink);white-space:nowrap;}

.done-wrap{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.done-lbl{font-size:.65rem;font-weight:600;color:#fff;}
.done-toggle{appearance:none;-webkit-appearance:none;width:20px;height:20px;border:1.5px solid var(--border3);border-radius:6px;cursor:pointer;background:transparent;position:relative;transition:all .15s;flex-shrink:0;}
.done-toggle:checked{background:var(--ok);border-color:var(--ok);}
.done-toggle:checked::after{content:'';position:absolute;left:4px;top:1px;width:7px;height:11px;border:2px solid white;border-top:none;border-left:none;transform:rotate(45deg);}

.holiday-pill{display:flex;align-items:center;gap:6px;font-size:.78rem;font-weight:600;color:var(--danger);background:var(--danger-dim);border:1px solid var(--danger-b);padding:5px 12px;border-radius:99px;width:fit-content;}
.no-sched{font-size:.82rem;color:rgba(255,255,255,.75);font-style:italic;font-weight:500;}

/* FOTO */
.proof-section{display:flex;flex-direction:column;gap:8px;background:rgba(255,255,255,.03);border:1px dashed var(--border3);border-radius:var(--r);padding:8px 10px;margin-top:2px;}
.photos-grid{display:flex;flex-wrap:wrap;gap:6px;}
.proof-thumb{width:56px;height:56px;border-radius:8px;object-fit:cover;cursor:pointer;flex-shrink:0;border:1.5px solid rgba(232,200,74,.3);transition:transform .2s,box-shadow .2s;}
.proof-thumb:hover{transform:scale(1.08);box-shadow:0 4px 16px rgba(0,0,0,.5);}
.proof-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.upload-label{display:flex;align-items:center;gap:6px;background:var(--brand-dim);color:var(--brand);border:1px solid rgba(232,200,74,.25);border-radius:8px;padding:6px 12px;font-size:.72rem;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap;}
.upload-label:hover{background:var(--brand);color:#0a0b0f;}
.upload-label input{display:none;}
.uploading-badge{display:none;align-items:center;gap:6px;font-size:.68rem;color:var(--brand);font-weight:600;}
.uploading-badge.show{display:flex;}
.spin{width:14px;height:14px;border:2px solid rgba(232,200,74,.3);border-top-color:var(--brand);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.upload-count{font-size:.65rem;color:var(--ink4);font-style:italic;}

/* LIGHTBOX */
.lightbox{display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.92);align-items:center;justify-content:center;cursor:zoom-out;}
.lightbox.show{display:flex;animation:fadeUp .2s ease;}
.lightbox img{max-width:92vw;max-height:88vh;border-radius:var(--r-lg);box-shadow:0 20px 60px rgba(0,0,0,.8);object-fit:contain;}
.lightbox-close{position:absolute;top:16px;right:18px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:white;font-size:1.1rem;width:36px;height:36px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;z-index:10;}
.lightbox-close:hover{background:rgba(255,255,255,.25);}

/* SECTION / MEMBERS */
.section-title{font-size:.58rem;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:var(--ink4);padding:0 1.4rem;margin-bottom:.75rem;margin-top:1.75rem;display:flex;align-items:center;gap:10px;}
.section-title::after{content:'';flex:1;height:1px;background:var(--border2);}
.members-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem;padding:0 1.4rem;}
.member-card{background:var(--surface);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--border2);border-radius:var(--r-lg);padding:.85rem .8rem;display:flex;flex-direction:column;gap:.45rem;transition:border-color .2s,box-shadow .2s;animation:fadeUp .4s ease both;}
.member-card:hover{border-color:rgba(232,200,74,.22);box-shadow:0 4px 16px rgba(0,0,0,.3);}
.member-av{width:44px;height:44px;border-radius:12px;overflow:hidden;border:1.5px solid rgba(232,200,74,.22);background:rgba(0,0,0,.4);}
.member-av img{width:100%;height:100%;object-fit:cover;display:block;}
.member-name{font-size:.78rem;font-weight:700;color:var(--ink);line-height:1.3;}
.member-count{font-size:.65rem;color:#fff;}
.member-count strong{color:var(--brand);font-weight:700;}

.legend{display:flex;gap:.85rem;flex-wrap:wrap;padding:0 1.4rem;margin-top:1.5rem;}
.legend-item{display:flex;align-items:center;gap:5px;font-size:.67rem;color:var(--ink3);font-weight:500;}
.legend-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}

.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(16px);background:var(--surface3);color:var(--ink);font-size:.78rem;font-weight:600;padding:.6rem 1.3rem;border-radius:50px;opacity:0;transition:all .28s ease;pointer-events:none;white-space:nowrap;z-index:999;box-shadow:0 12px 40px rgba(0,0,0,.5);border:1px solid var(--border3);backdrop-filter:blur(12px);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--border3);border-radius:99px;}

@media(max-width:440px){
  .header,.week-nav,.schedule,.denda-wrap{padding-left:1rem;padding-right:1rem;}
  .members-grid{padding-left:1rem;padding-right:1rem;grid-template-columns:repeat(2,1fr);}
  .section-title,.legend,.slider-section{padding-left:1rem;padding-right:1rem;}
  .date-col{min-width:68px;}.brand-title{font-size:1rem;}.brand-logo{width:40px;height:40px;border-radius:11px;}
}
</style>
</head>
<body>

<div class="bg-layer"></div>
<div class="bg-overlay"></div>
<div class="bg-glow"></div>

<div class="page">

  <header class="header">
    <div class="header-top">
      <div class="brand">
        <div class="brand-logo">
          <img src="https://i.imgur.com/mF88miV.png" alt="Logo">
        </div>
        <div class="brand-info">
          <!-- room-tag dan brand-title diisi otomatis dari ROOM_ID -->
          <span class="room-tag" id="ui-room-tag">—</span>
          <div class="brand-title" id="ui-brand-title">Jadwal Piket 🏠</div>
        </div>
      </div>
      <div class="header-clock">
        <span class="live-date" id="live-date">—</span>
        <span class="live-time" id="live-time">—</span>
      </div>
    </div>
    <div class="today-strip loading" id="today-strip">
      <div class="strip-dot"></div>
      <span id="strip-text">Memuat jadwal...</span>
    </div>
  </header>

  <div class="denda-wrap">
    <div class="denda-banner">
      <div class="denda-left">
        <div class="denda-icon-wrap">
          <img src="https://i.imgur.com/mF88miV.png" alt="logo">
        </div>
        <div class="denda-info">
          <div class="denda-tag">Peraturan Kamar</div>
          <div class="denda-msg">TIDAK MAU PIKET = KENA DENDA!</div>
        </div>
      </div>
      <div class="denda-pill">5.000 LKR</div>
    </div>
  </div>

  <div class="slider-section">
    <div class="slider-wrap" id="sliderWrap">
      <div class="slider-track" id="sliderTrack">
        <div class="slide"><img src="https://i.imgur.com/GXI413m.png" alt="1" draggable="false"></div>
        <div class="slide"><img src="https://i.imgur.com/KcYNWOi.png" alt="2" draggable="false"></div>
        <div class="slide"><img src="https://i.imgur.com/DNYgS7O.png" alt="3" draggable="false"></div>
        <div class="slide"><img src="https://i.imgur.com/jS1tNw5.png" alt="4" draggable="false"></div>
        <div class="slide"><img src="https://i.imgur.com/BpOwqOt.png" alt="5" draggable="false"></div>
        <div class="slide"><img src="https://i.imgur.com/4C9ji7Z.png" alt="6" draggable="false"></div>
        <div class="slide"><img src="https://i.imgur.com/L9PJLoa.png" alt="7" draggable="false"></div>
      </div>
      <button class="slider-btn prev" id="sPrev">&#8592;</button>
      <button class="slider-btn next" id="sNext">&#8594;</button>
      <div class="slide-counter" id="sCtr">1 / 7</div>
      <div class="slider-dots" id="sDots"></div>
    </div>
    <div class="slider-bar"><div class="slider-bar-fill" id="sBar"></div></div>
  </div>

  <div class="week-nav">
    <span class="week-label" id="week-label">—</span>
    <div class="week-ctrl">
      <button class="btn-week" id="btn-prev">&#8592;</button>
      <button class="btn-today" id="btn-today">Hari ini</button>
      <button class="btn-week" id="btn-next">&#8594;</button>
    </div>
  </div>

  <div class="schedule" id="sched"></div>

  <div class="section-title">Anggota Kamar</div>

/* ════════════════════════════════════════════════════════════════

   ──────────────────────────────────────────────────────────────

     ADD COLUMN IF NOT EXISTS room_id text NOT NULL DEFAULT 'naga-putih';

   -- LANGKAH 2: Drop primary key lama
   ALTER TABLE "KAMAR-NAGA-PUTIH"
     DROP CONSTRAINT IF EXISTS "KAMAR-NAGA-PUTIH_pkey";

   -- LANGKAH 3: Buat composite primary key baru
   ALTER TABLE "KAMAR-NAGA-PUTIH"

   Tidak perlu tabel baru — satu tabel untuk semua kamar.
   ████████████████████████████████████████████████████████████ */

const SUPABASE_URL = 'https://lzjmyildurannngskrcyo.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx6am15aWxkdXJhbm5nc2tyY3lvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEyMzU1NjUsImV4cCI6MjA4NjgxMTU2NX0.ybyZTOLYGMOjM_SucsfpsVU3WaL8qVY4m-1XYdK2J7Q';

/* ── GANTI DUA BARIS INI UNTUK TIAP KAMAR ── */

const GROUPS = [

/* ════════════════════════════════════════════════════════════════

const TABLE      = 'KAMAR-NAGA-PUTIH';
const BUCKET     = 'foto-piket';
const db         = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* ── STATE ── */
const today    = new Date(); today.setHours(0,0,0,0);
const todayKey = fmtDate(today);
let weekOffset = 0;
let doneMap    = {}; // { "YYYY-MM-DD": { is_done:bool, photos:string[] } }

const DAY_S = ['Min','Sen','Sel','Rab','Kam','Jum','Sab'];
const DAY_F = ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
const MON_S = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
const MON_F = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];

/* ── INJECT ROOM LABEL KE UI ── */
(function applyRoomLabel() {

  const title = document.getElementById('ui-brand-title');

/* ════════════════════════════════════════════════════════════════
   HELPERS
════════════════════════════════════════════════════════════════ */
function fmtDate(d) {
  return d.getFullYear() + '-' +
    String(d.getMonth()+1).padStart(2,'0') + '-' +
    String(d.getDate()).padStart(2,'0');
}

function getGroupForDate(date) {
  const d    = new Date(date); d.setHours(0,0,0,0);
  const diff = Math.round((d - ANCHOR) / 86400000);
  if (diff < 0 || diff % CYCLE_DAYS !== 0) return null;
  return GROUPS[Math.floor(diff / CYCLE_DAYS) % GROUPS.length];
}

function parsePhotos(raw) {
  if (!raw) return [];
  if (Array.isArray(raw)) return raw;
  try { const p = JSON.parse(raw); return Array.isArray(p) ? p : (p ? [p] : []); }
  catch { return raw ? [raw] : []; }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  if (!t) return;
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._tid);
  t._tid = setTimeout(() => t.classList.remove('show'), 2600);
}

function refreshUI() { renderStrip(); renderSchedule(); renderMembers(); }

/* ════════════════════════════════════════════════════════════════
   SUPABASE — LOAD (filter by room_id)
════════════════════════════════════════════════════════════════ */
async function loadData() {
  try {
    const { data, error } = await db
      .from(TABLE)
      .select('date_key, is_done, photo_url')
      .eq('room_id', ROOM_ID);          /* ← filter multi-tenant */

    if (error) throw error;

    doneMap = {};
    (data || []).forEach(row => {
      doneMap[row.date_key] = {
        is_done: row.is_done || false,
        photos:  parsePhotos(row.photo_url),
      };
    });
  } catch (err) {
    console.warn('loadData error:', err.message);
  } finally {
    refreshUI();
  }
}

/* ════════════════════════════════════════════════════════════════
   SUPABASE — SAVE STATUS (composite key: date_key + room_id)
════════════════════════════════════════════════════════════════ */
async function saveStatus(dateKey, isDone) {
  try {
    const current = doneMap[dateKey] || { is_done: false, photos: [] };
    const { error } = await db
      .from(TABLE)
      .upsert(
        {
          date_key:  dateKey,
          room_id:   ROOM_ID,            /* ← sertakan room_id */
          is_done:   isDone,
          photo_url: JSON.stringify(current.photos),
        },
        { onConflict: 'date_key,room_id' }  /* ← composite conflict key */
      );
    if (error) throw error;
  } catch (err) {
    console.error('saveStatus error:', err.message);
    showToast('❌ Gagal sinkron ke database');
  }
}

/* ════════════════════════════════════════════════════════════════
   SUPABASE — UPLOAD FOTO (path: ROOM_ID/filename)
════════════════════════════════════════════════════════════════ */
async function uploadPhotos(dateKey, files) {
  if (!files || files.length === 0) return;

  const spinner = document.getElementById(`spinner-${dateKey}`);
  if (spinner) spinner.classList.add('show');
  showToast(`⏳ Mengupload ${files.length} foto...`);

  const uploaded = [], errors = [];

  for (const file of files) {
    try {
      const ext      = file.name.split('.').pop() || 'jpg';
      /* ── path isolasi per kamar: ROOM_ID/filename ── */
      const fileName = `${ROOM_ID}/${dateKey}-${Date.now()}-${Math.random().toString(36).slice(2,7)}.${ext}`;

      const { error: upErr } = await db.storage
        .from(BUCKET)
        .upload(fileName, file, { upsert: false, contentType: file.type });

      if (upErr) throw upErr;

      const { data: urlData } = db.storage.from(BUCKET).getPublicUrl(fileName);
      uploaded.push(urlData.publicUrl);
    } catch (err) {
      errors.push(file.name);
      console.error('upload error:', file.name, err.message);
    }
  }

  if (spinner) spinner.classList.remove('show');

  if (uploaded.length === 0) {
    showToast('❌ Semua foto gagal diupload');
    return;
  }

  if (!doneMap[dateKey]) doneMap[dateKey] = { is_done: false, photos: [] };
  const allPhotos = [...doneMap[dateKey].photos, ...uploaded];
  doneMap[dateKey].photos  = allPhotos;
  doneMap[dateKey].is_done = true;

  try {
    const { error: dbErr } = await db
      .from(TABLE)
      .upsert(
        {
          date_key:  dateKey,
          room_id:   ROOM_ID,            /* ← sertakan room_id */
          is_done:   true,
          photo_url: JSON.stringify(allPhotos),
        },
        { onConflict: 'date_key,room_id' }  /* ← composite conflict key */
      );
    if (dbErr) throw dbErr;
  } catch (err) {
    console.error('DB save error:', err.message);
  }

  showToast(errors.length > 0
    ? `📸 ${uploaded.length} foto tersimpan, ${errors.length} gagal`
    : `📸 ${uploaded.length} foto tersimpan!`
  );
  refreshUI();
}

/* ════════════════════════════════════════════════════════════════
   REALTIME — filter hanya room_id milik kamar ini
════════════════════════════════════════════════════════════════ */
function listenRealtime() {
  db.channel(`piket-rt-${ROOM_ID}`)   /* channel name unik per kamar */
    .on(
      'postgres_changes',
      {
        event:  '*',
        schema: 'public',
        table:  TABLE,
        filter: `room_id=eq.${ROOM_ID}`,   /* ← filter realtime */
      },
      payload => {
        const row = payload.new || {};
        if (!row.date_key || row.room_id !== ROOM_ID) return;
        doneMap[row.date_key] = {
          is_done: row.is_done || false,
          photos:  parsePhotos(row.photo_url),
        };
        refreshUI();
      }
    )
    .subscribe();
}

/* ════════════════════════════════════════════════════════════════
   SLIDER
════════════════════════════════════════════════════════════════ */
(function initSlider() {
  const TOTAL = 7, INTERVAL = 2500;
  const track = document.getElementById('sliderTrack');
  const dots  = document.getElementById('sDots');
  const ctr   = document.getElementById('sCtr');
  const bar   = document.getElementById('sBar');
  if (!track || !dots) return;

  let cur = 0, timer = null, raf = null, t0 = null;

  for (let i = 0; i < TOTAL; i++) {
    const d = document.createElement('button');
    d.className = 'dot' + (i === 0 ? ' active' : '');
    d.onclick = () => goTo(i, true);
    dots.appendChild(d);
  }

  function updateUI() {
    track.style.transform = `translateX(-${cur*100}%)`;
    ctr.textContent = `${cur+1} / ${TOTAL}`;
    dots.querySelectorAll('.dot').forEach((d,i) => d.classList.toggle('active', i === cur));
  }
  function goTo(i, manual) { cur = (i+TOTAL)%TOTAL; updateUI(); if (manual) reset(); }
  function startProg() {
    cancelAnimationFrame(raf);
    if (bar) { bar.style.transition='none'; bar.style.width='0%'; }
    t0 = performance.now();
    (function step(now) {
      const p = Math.min(((now-t0)/INTERVAL)*100, 100);
      if (bar) bar.style.width = p+'%';
      if (p < 100) raf = requestAnimationFrame(step);
    })(performance.now());
  }
  function start() { clearInterval(timer); startProg(); timer = setInterval(() => { cur=(cur+1)%TOTAL; updateUI(); startProg(); }, INTERVAL); }
  function reset() { clearInterval(timer); cancelAnimationFrame(raf); start(); }

  document.getElementById('sPrev').onclick = () => goTo(cur-1, true);
  document.getElementById('sNext').onclick = () => goTo(cur+1, true);

  let tx = null;
  const wrap = document.getElementById('sliderWrap');
  wrap.addEventListener('touchstart', e => { tx = e.touches[0].clientX; }, { passive:true });
  wrap.addEventListener('touchend',   e => {
    if (tx === null) return;
    const diff = tx - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 40) goTo(diff > 0 ? cur+1 : cur-1, true);
    tx = null;
  });
  wrap.onmouseenter = () => { clearInterval(timer); cancelAnimationFrame(raf); };
  wrap.onmouseleave = start;
  updateUI(); start();
})();

/* ════════════════════════════════════════════════════════════════
   RENDER — STRIP
════════════════════════════════════════════════════════════════ */
function renderStrip() {
  const strip = document.getElementById('today-strip');
  const txt   = document.getElementById('strip-text');
  if (!strip || !txt) return;
  strip.className = 'today-strip';
  if (today.getDay() === 0) {
    strip.classList.add('holiday');
    txt.textContent = 'Hari ini Minggu — Libur piket! 🎉';
    return;
  }
  const grp  = getGroupForDate(today);
  const data = doneMap[todayKey];
  strip.classList.add('on-duty');
  if (grp) {
    txt.innerHTML = (data && data.is_done)
      ? `✅ Piket <strong>${grp.persons.join(' & ')}</strong> sudah selesai!`
      : `🧹 Giliran: <strong>${grp.persons.join(' & ')}</strong> — Semangat!`;
  } else {
    txt.textContent = '📅 Tidak ada jadwal piket hari ini';
  }
}

/* ════════════════════════════════════════════════════════════════
   RENDER — JADWAL MINGGUAN
════════════════════════════════════════════════════════════════ */
function renderSchedule() {
  const grid = document.getElementById('sched');
  if (!grid) return;

  const dow    = today.getDay() === 0 ? 6 : today.getDay() - 1;
  const monday = new Date(today);
  monday.setDate(today.getDate() - dow + weekOffset * 7);
  const dates = Array.from({ length: 7 }, (_, i) => {
    const d = new Date(monday); d.setDate(monday.getDate()+i); return d;
  });
  const sun = dates[6];
  document.getElementById('week-label').textContent =
    dates[0].getDate() + ' ' + MON_S[dates[0].getMonth()] + ' – ' +
    sun.getDate() + ' ' + MON_S[sun.getMonth()] + ' ' + sun.getFullYear();

  let html = '';
  dates.forEach((date, idx) => {
    const dkey    = fmtDate(date);
    const isSun   = date.getDay() === 0;
    const isToday = dkey === todayKey;
    const rowData = doneMap[dkey] || { is_done:false, photos:[] };
    const done    = rowData.is_done;
    const photos  = rowData.photos || [];
    const grp     = getGroupForDate(date);

    let cls = 'day-card' +
      (isToday ? ' is-today live' : done ? ' done-card' : ' upcoming') +
      (isSun ? ' is-sunday' : '');

    let body = '';
    if (isSun) {
      body = `<div class="holiday-pill">🔴 Libur — Minggu</div>`;
    } else if (grp) {
      const chips = grp.persons.map((p,i) => `
        <div class="person-chip">
          <div class="avatar-sm ${done ? 'done-av' : ''}">
            <img src="${grp.photos[i]}" alt="${p}" onerror="this.style.display='none'">
          </div>
          <span class="person-nm">${p}</span>
        </div>`).join('');

      const photosHtml = photos.length
        ? `<div class="photos-grid">${photos.map(url =>
            `<img src="${url}" class="proof-thumb" onclick="openLightbox('${url}')" title="Klik lihat bukti">`
          ).join('')}</div>`
        : '';

      body = `
        <div class="persons-row">
          <div class="persons-list">${chips}</div>
          <div class="done-wrap">
            <label class="done-lbl" for="chk-${dkey}">${done ? '✓ Selesai' : 'Tandai'}</label>
            <input class="done-toggle" type="checkbox" id="chk-${dkey}" data-dk="${dkey}" ${done ? 'checked' : ''}>
          </div>
        </div>
        <div class="proof-section">
          ${photosHtml}
          <div class="proof-actions">
            <label class="upload-label">
              📸 ${photos.length > 0 ? `Tambah Foto (${photos.length})` : 'Upload Bukti'}
              <input type="file" accept="image/*" multiple data-dk="${dkey}">
            </label>
            <div class="uploading-badge" id="spinner-${dkey}">
              <div class="spin"></div> Mengupload...
            </div>
            ${photos.length > 0 ? `<span class="upload-count">${photos.length} foto tersimpan</span>` : ''}
          </div>
        </div>`;
    } else {
      body = `<div class="no-sched">Tidak ada jadwal piket hari ini</div>`;
    }

    html += `
      <div class="${cls}" style="animation-delay:${idx*.05}s">
        <div class="day-row">
          <div class="date-col">
            <div class="date-dow">${DAY_S[date.getDay()]}</div>
            <div class="date-num">${date.getDate()}</div>
            <div class="date-mon">${MON_S[date.getMonth()]}</div>
          </div>
          <div class="card-body">${body}</div>
        </div>
      </div>`;
  });

  grid.innerHTML = html;

  grid.querySelectorAll('.done-toggle').forEach(chk => {
    chk.onchange = async function () {
      const dk = this.dataset.dk, val = this.checked;
      if (!doneMap[dk]) doneMap[dk] = { is_done:false, photos:[] };
      doneMap[dk].is_done = val;
      if (!val) doneMap[dk].photos = [];
      refreshUI();
      await saveStatus(dk, val);
      showToast(val ? '✅ Tersimpan!' : '↩ Dibatalkan');
    };
  });

  grid.querySelectorAll('input[type="file"][data-dk]').forEach(input => {
    input.onchange = function () {
      if (this.files && this.files.length > 0) {
        uploadPhotos(this.dataset.dk, Array.from(this.files));
        this.value = '';
      }
    };
  });
}

/* ════════════════════════════════════════════════════════════════
   RENDER — ANGGOTA
════════════════════════════════════════════════════════════════ */
function renderMembers() {
  const grid = document.getElementById('members');
  if (!grid) return;
  let html = '';
  ALL_MEMBERS.forEach((m, i) => {
    let count = 0;
    Object.keys(doneMap).forEach(dk => {
      if (doneMap[dk]?.is_done) {
        const g = getGroupForDate(new Date(dk + 'T00:00:00'));
        if (g && g.persons.includes(m.name)) count++;
      }
    });
    html += `
      <div class="member-card" style="animation-delay:${i*.05}s">
        <div class="member-av">
          <img src="${m.photo}" alt="${m.name}" onerror="this.parentElement.style.background='var(--brand-dim)'">
        </div>
        <div class="member-name">${m.name}</div>
        <div class="member-count">Selesai: <strong>${count}×</strong></div>
      </div>`;
  });
  grid.innerHTML = html;
}

/* ════════════════════════════════════════════════════════════════
   JAM & NAVIGASI
════════════════════════════════════════════════════════════════ */
function updateClock() {
  const n = new Date();
  const dEl = document.getElementById('live-date');
  const tEl = document.getElementById('live-time');
  if (dEl) dEl.textContent = DAY_F[n.getDay()] + ', ' + n.getDate() + ' ' + MON_F[n.getMonth()] + ' ' + n.getFullYear();
  if (tEl) tEl.textContent = String(n.getHours()).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0') + ':' + String(n.getSeconds()).padStart(2,'0');
}

document.getElementById('btn-prev').onclick  = () => { weekOffset--; renderSchedule(); };
document.getElementById('btn-next').onclick  = () => { weekOffset++; renderSchedule(); };
document.getElementById('btn-today').onclick = () => { weekOffset = 0; renderSchedule(); showToast('↩ Kembali ke minggu ini'); };

/* ════════════════════════════════════════════════════════════════
   INIT
════════════════════════════════════════════════════════════════ */
setInterval(updateClock, 1000);
updateClock();
loadData();
listenRealtime();
</script>
